version: 0.1.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  firebase_core: ^3.4.0
  firebase_auth: ^5.2.0
  cloud_firestore: ^5.4.0
  firebase_messaging: ^15.1.0
  geolocator: ^13.0.1
  google_maps_flutter: ^2.9.0
  flutter_local_notifications: ^17.2.2
  vibration: ^1.9.0
  url_launcher: ^6.3.0
  flutter_blue_plus: ^1.34.5
  flutter_background_geolocation: ^4.16.0
  flutter_callkit_incoming: ^2.0.1
  intl: ^0.19.0

flutter:
  uses-material-design: true
